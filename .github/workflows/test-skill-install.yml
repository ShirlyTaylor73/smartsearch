name: Test skill installation

on:
  push:
    paths:
      - "src/smart_search/skill_installer.py"
      - "src/smart_search/cli.py"
      - "src/smart_search/assets/skills/**"
      - "skills/**"
      - "npm/**"
      - "tests/test_skill_installer.py"
      - ".github/workflows/test-skill-install.yml"
  pull_request:
    paths:
      - "src/smart_search/skill_installer.py"
      - "src/smart_search/cli.py"
      - "src/smart_search/assets/skills/**"
      - "skills/**"
      - "npm/**"
      - "tests/test_skill_installer.py"
      - ".github/workflows/test-skill-install.yml"

jobs:
  skill-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false

      - name: Install Python test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run focused skill tests
        run: python -m pytest tests/test_skill_installer.py -q

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Verify packaged npx skill installation
        run: node npm/scripts/test-npx-skill-install.js
